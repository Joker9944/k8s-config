clusterName: nyx
# renovate: datasource=docker depName=talos packageName=ghcr.io/siderolabs/installer
talosVersion: v1.10.5
# renovate: datasource=docker depName=kubelet packageName=ghcr.io/siderolabs/kubelet
kubernetesVersion: v1.32.6
endpoint: https://${VIP}:6443

nodes:

  - hostname: nyx-hybrid-1
    ipAddress: ${HYBRID_1_IP}
    controlPlane: true
    installDisk: /dev/nvme0n1
    networkInterfaces:
      - interface: enp2s0
        addresses:
          - ${HYBRID_1_IP}/23
        routes:
          - network: 0.0.0.0/0
            gateway: ${GATEWAY_IP}
        vip:
          ip: ${VIP}
    certSANs:
      - nyx-hybrid-1.${TAILNET_NAME}
    schematic:
      customization:
        systemExtensions:
          officialExtensions:
            - siderolabs/iscsi-tools
            - siderolabs/util-linux-tools
            - siderolabs/realtek-firmware
    patches:
      - '@patches/hybrid.yaml'
      - '@patches/longhorn.yaml'
      - |-
        machine:
          kubelet:
            nodeIP:
              validSubnets:
                - ${HYBRID_1_IP}/32
    nodeLabels:
      vonarx.online/cpu-capacity: '6'
      vonarx.online/cpu-performance: high
      vonarx.online/memory-capacity: '31929'
      vonarx.online/memory-performance: high

  - hostname: nyx-hybrid-2
    ipAddress: nyx-hybrid-2.${TAILNET_NAME}
    controlPlane: true
    installDisk: /dev/nvme0n1
    networkInterfaces:
      - interface: enp2s0
        addresses:
          - ${HYBRID_2_IP}/23
        routes:
          - network: 0.0.0.0/0
            gateway: ${GATEWAY_IP}
        vip:
          ip: ${VIP}
    certSANs:
      - nyx-hybrid-2.${TAILNET_NAME}
    schematic:
      customization:
        systemExtensions:
          officialExtensions:
            - siderolabs/iscsi-tools
            - siderolabs/util-linux-tools
            - siderolabs/realtek-firmware
    patches:
      - '@patches/hybrid.yaml'
      - '@patches/longhorn.yaml'
      - |-
        machine:
          kubelet:
            nodeIP:
              validSubnets:
                - ${HYBRID_2_IP}/32
    nodeLabels:
      vonarx.online/cpu-capacity: '6'
      vonarx.online/cpu-performance: high
      vonarx.online/memory-capacity: '31929'
      vonarx.online/memory-performance: high

  - hostname: nyx-hybrid-3
    ipAddress: nyx-hybrid-3.${TAILNET_NAME}
    controlPlane: true
    installDisk: /dev/nvme0n1
    networkInterfaces:
      - interface: enp2s0
        addresses:
          - ${HYBRID_3_IP}/23
        routes:
          - network: 0.0.0.0/0
            gateway: ${GATEWAY_IP}
        vip:
          ip: ${VIP}
    certSANs:
      - nyx-hybrid-3.${TAILNET_NAME}
    schematic:
      customization:
        systemExtensions:
          officialExtensions:
            - siderolabs/iscsi-tools
            - siderolabs/util-linux-tools
            - siderolabs/realtek-firmware
    patches:
      - '@patches/hybrid.yaml'
      - '@patches/longhorn.yaml'
      - |-
        machine:
          kubelet:
            nodeIP:
              validSubnets:
                - ${HYBRID_3_IP}/32
    nodeLabels:
      vonarx.online/cpu-capacity: '6'
      vonarx.online/cpu-performance: high
      vonarx.online/memory-capacity: '31929'
      vonarx.online/memory-performance: high

  - hostname: nyx-worker-1
    ipAddress: ${WORKER_1_IP}
    controlPlane: false
    installDisk: /dev/vda
    networkInterfaces:
      - interface: enp5s0
        addresses:
          - ${WORKER_1_IP}/23
        routes:
          - network: 0.0.0.0/0
            gateway: ${GATEWAY_IP}
    schematic:
      customization:
        systemExtensions:
          officialExtensions:
            - siderolabs/iscsi-tools
            - siderolabs/util-linux-tools
            - siderolabs/nonfree-kmod-nvidia-production
            - siderolabs/nvidia-container-toolkit-production
    patches:
      - '@patches/nvidia.yaml'
      - '@patches/longhorn.yaml'
    nodeLabels:
      vonarx.online/nfs-host: 'true'
      vonarx.online/s3-host: 'true'
      vonarx.online/cpu-capacity: '6'
      vonarx.online/cpu-performance: low
      vonarx.online/memory-capacity: '15972'
      vonarx.online/memory-performance: high

controlPlane:
  nameservers:
    - ${GATEWAY_IP}
    - ${NS_1_IP}
    - ${NS_2_IP}
  patches:
    - '@patches/ntp.yaml'
    - '@patches/logging.yaml'
    - '@patches/kube-proxy-metrics.yaml'
  extensionServices:
    - name: tailscale
      environment:
        - TS_STATE_DIR=/var/lib/tailscale
        - TS_ROUTES=${VIP}/32
  schematic:
    customization:
      systemExtensions:
        officialExtensions:
          - siderolabs/tailscale
worker:
  nameservers:
    - ${GATEWAY_IP}
    - ${NS_1_IP}
    - ${NS_2_IP}
  patches:
    - '@patches/ntp.yaml'
    - '@patches/logging.yaml'
    - '@patches/kube-proxy-metrics.yaml'
  schematic:
    customization:
      systemExtensions:
        officialExtensions:
          - siderolabs/iscsi-tools
          - siderolabs/util-linux-tools
