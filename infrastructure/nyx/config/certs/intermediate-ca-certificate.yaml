---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: nyx-intermediate-ca
  namespace: trust-manager
spec:
  isCA: true
  commonName: intermediate.trust-manager.svc.cluster.local
  duration: 6480h # 270 days
  issuerRef:
    group: cert-manager.io
    kind: Issuer
    name: nyx-root-ca
  secretName: nyx-intermediate-ca-cert
