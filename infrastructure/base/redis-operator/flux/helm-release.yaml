---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redis-operator
spec:
  interval: 5m
  chart:
    spec:
      chart: redis-operator
      version: 0.24.0
      sourceRef:
        kind: HelmRepository
        name: ot-helm
      interval: 5m

  install:
    crds: CreateReplace
    remediation:
      retries: 3

  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3

  values:
    issuer:
      create: false
