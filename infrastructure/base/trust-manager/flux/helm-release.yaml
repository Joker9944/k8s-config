---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trust-manager
spec:
  interval: 30m
  chart:
    spec:
      chart: trust-manager
      version: v0.18.0
      sourceRef:
        kind: HelmRepository
        name: jetstack
      interval: 30m
  values:

    secretTargets:
      enabled: true

      authorizedSecrets:
        - nyx-ca-cert-bundle
        - public-nyx-ca-cert-bundle
