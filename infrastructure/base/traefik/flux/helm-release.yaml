---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
spec:
  interval: 30m
  chart:
    spec:
      chart: traefik
      version: 39.0.0
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: traefik

  install:
    crds: CreateReplace
    remediation:
      retries: 3

  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3

  values:
    deployment:
      # Switched to DaemonSet since it allows node local routing with externalTrafficPolicy set to Local
      kind: DaemonSet

    ingressClass:
      enabled: false

    experimental:
      # TODO Implement bouncer
      plugins:
        geoblock:
          moduleName: github.com/PascalMinder/geoblock
          # renovate: datasource=github-tags depName=geoblock-traefik-plugin packageName=PascalMinder/geoblock versioning=semver-coerced
          version: v0.3.6
        oidc:
          moduleName: github.com/lukaszraczylo/traefikoidc # cSpell:ignore lukaszraczylo traefikoidc
          # renovate: datasource=github-tags depName=oidc-traefik-plugin packageName=lukaszraczylo/traefikoidc versioning=semver-coerced
          version: v0.8.21

    logs:
      general:
        level: INFO
        format: json
      access:
        enabled: true
        format: json
        fields:
          headers:
            defaultmode: keep

    service:
      annotations:
        metallb.universe.tf/loadBalancerIPs: 192.168.0.128
      spec:
        externalTrafficPolicy: Local

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik-oidc-redis
spec:
  interval: 30m
  chart:
    spec:
      chart: redis-replication
      version: 0.16.13
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: ot-helm

  values:
    redisReplication:
      redisSecret:
        secretName: traefik-oidc-redis
        secretKey: password
