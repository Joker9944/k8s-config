---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
spec:
  interval: 30m
  chart:
    spec:
      chart: traefik
      version: 39.0.2
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: traefik

  install:
    crds: CreateReplace
    remediation:
      retries: 3

  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3

  values:
    deployment:
      # Switched to DaemonSet since it allows node local routing with externalTrafficPolicy set to Local
      kind: DaemonSet

    ingressClass:
      enabled: false

    experimental:
      # TODO Implement bouncer
      plugins:
        geoblock:
          moduleName: github.com/PascalMinder/geoblock
          # renovate: datasource=github-tags depName=geoblock-traefik-plugin packageName=PascalMinder/geoblock versioning=semver-coerced
          version: v0.3.6
        oidc:
          moduleName: github.com/lukaszraczylo/traefikoidc # cSpell:ignore lukaszraczylo traefikoidc
          # renovate: datasource=github-tags depName=oidc-traefik-plugin packageName=lukaszraczylo/traefikoidc versioning=semver-coerced
          version: v0.8.22

    logs:
      general:
        level: INFO
        format: json
      access:
        enabled: true
        format: json
        fields:
          headers:
            defaultmode: keep

    service:
      annotations:
        metallb.universe.tf/loadBalancerIPs: 192.168.0.128
      spec:
        externalTrafficPolicy: Local

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik-geo-lookup
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: bjw-s

  values:
    controllers:
      traefik-geo-lookup:
        type: deployment
        strategy: RollingUpdate

        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: &GUID 1000
            supplementalGroups: [568]
            fsGroup: *GUID
            seccompProfile:
              type: RuntimeDefault

        containers:
          country:
            image:
              repository: lineofflight/country # cSpell:ignore lineofflight
              tag: latest@sha256:b82354b185cd721eba4e40fc82fc96af45eb6d4171eb24f0fbe0ee0f88bf1a69
            env:
              PORT: &port_http 3000
            envFrom:
              - secretRef:
                  name: traefik-geo-lookup
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /info
                    port: *port_http
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /info
                    port: *port_http
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /info
                    port: *port_http
                  failureThreshold: 30
                  periodSeconds: 5
            # TODO resources
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL

    service:
      traefik-geo-lookup:
        controller: traefik-geo-lookup
        ports:
          http:
            port: *port_http

    persistence:
      data:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 1Gi
        globalMounts:
          - path: /app/data

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik-oidc-redis
spec:
  interval: 30m
  chart:
    spec:
      chart: redis-replication
      version: 0.16.13
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: ot-helm

  values:
    redisReplication:
      redisSecret:
        secretName: traefik-oidc-redis
        secretKey: password
